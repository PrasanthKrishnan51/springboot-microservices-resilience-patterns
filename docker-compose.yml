version: "3.9"

services:

  # ───────────────── INFRASTRUCTURE ─────────────────

  mongodb:
    image: mongo:7
    container_name: ecom-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ecommerce
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "admin", "-p", "admin123", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecom-network

  # ───────────────── ZOOKEEPER ─────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ecom-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ecom-network

  # ───────────────── KAFKA ─────────────────

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecom-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ecom-network

  # ───────────────── KAFKA UI ─────────────────

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecom-kafka-ui
    restart: unless-stopped
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ecom-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - ecom-network

  # ───────────────── REDIS CACHE ─────────────────

  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ecom-network

  # ───────────────── PROMETHEUS ─────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: ecom-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ecom-network

  # ───────────────── GRAFANA ─────────────────

  grafana:
    image: grafana/grafana:latest
    container_name: ecom-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ecom-network


  # ───────────────── MICROSERVICES ─────────────────

  api-gateway:
    build: ./api-gateway
    container_name: ecom-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/ecommerce?authSource=admin
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - ecom-network


  product-service:
    build: ./product-service
    container_name: ecom-product-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/ecommerce?authSource=admin
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ecom-network


  inventory-service:
    build: ./inventory-service
    container_name: ecom-inventory-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/ecommerce?authSource=admin
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ecom-network


  order-service:
    build: ./order-service
    container_name: ecom-order-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/ecommerce?authSource=admin
      KAFKA_BOOTSTRAP: kafka:29092

      INVENTORY_SERVICE_URL: http://inventory-service:8083
      PRODUCT_SERVICE_URL: http://product-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8084
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ecom-network


  payment-service:
    build: ./payment-service
    container_name: ecom-payment-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/ecommerce?authSource=admin
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ecom-network


  notification-service:
    build: ./notification-service
    container_name: ecom-notification-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/ecommerce?authSource=admin
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ecom-network


# ───────────────── VOLUMES ─────────────────

volumes:
  mongodb-data:
  redis-data:
  grafana-data:

# ───────────────── NETWORK ─────────────────

networks:
  ecom-network:
    driver: bridge