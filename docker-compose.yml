version: '3.8'

# ══════════════════════════════════════════════════════════════════
#  E-Commerce Platform – Full Docker Stack
#  Services: Kafka, Zookeeper, Redis, Prometheus, Grafana
#            + 6 Spring Boot microservices
# ══════════════════════════════════════════════════════════════════

services:

  # ── Infrastructure ────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ecom-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ecom-network]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecom-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [ecom-network]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecom-kafka-ui
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ecom-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on: [kafka]
    networks: [ecom-network]

  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ecom-network]

  prometheus:
    image: prom/prometheus:latest
    container_name: ecom-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks: [ecom-network]

  grafana:
    image: grafana/grafana:latest
    container_name: ecom-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus]
    networks: [ecom-network]

  # ── Microservices ─────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: ecom-api-gateway
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      ORDER_SERVICE_URL: http://order-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082
      INVENTORY_SERVICE_URL: http://inventory-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
      USER_SERVICE_URL: http://user-service:8085
    depends_on: [kafka, redis]
    networks: [ecom-network]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: ecom-order-service
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      INVENTORY_SERVICE_URL: http://inventory-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
      PRODUCT_SERVICE_URL: http://product-service:8082
    depends_on: [kafka]
    networks: [ecom-network]

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: ecom-product-service
    ports:
      - "8082:8082"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on: [kafka]
    networks: [ecom-network]

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: ecom-inventory-service
    ports:
      - "8083:8083"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on: [kafka]
    networks: [ecom-network]

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: ecom-payment-service
    ports:
      - "8084:8084"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on: [kafka]
    networks: [ecom-network]

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: ecom-notification-service
    ports:
      - "8086:8086"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on: [kafka]
    networks: [ecom-network]

volumes:
  redis-data:
  grafana-data:

networks:
  ecom-network:
    driver: bridge
